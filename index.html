<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persistent Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>Etch-A-Sketch</h1>
        <p>
          Your drawings are automatically saved to your browser's LocalStorage!
        </p>
      </header>

      <div class="controls-panel" data-role="control-wrapper">
        <div class="input-group">
          <label for="grid-size-input">Grid Resolution:</label>
          <input
            type="number"
            id="grid-size-input"
            min="10"
            max="64"
            value="16"
          />
        </div>
        <button id="reset-btn" class="btn btn-danger">
          Clear & Apply Grid
        </button>
      </div>

      <div class="grid-frame">
        <div id="grid-container"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
